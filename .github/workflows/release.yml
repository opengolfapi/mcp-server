name: Release

# Tag a version and everything publishes itself:
#   npm version patch && git push --follow-tags
# Requires one repo secret: NPM_TOKEN (npm Automation token). The MCP Registry step
# uses GitHub OIDC — no secret needed (the repo's own identity authenticates).

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write   # required for MCP Registry OIDC login

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci || npm install
      - run: npm run build
      - run: npm test

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install mcp-publisher
        run: |
          URL=$(curl -s https://api.github.com/repos/modelcontextprotocol/registry/releases/latest \
            | grep -oE "https://[^\"]*mcp-publisher[^\"]*linux[^\"]*amd64[^\"]*\.tar\.gz" | head -1)
          echo "Downloading $URL"
          curl -L "$URL" | tar xz mcp-publisher

      - name: Publish to MCP Registry (OIDC)
        run: |
          ./mcp-publisher login github-oidc
          ./mcp-publisher publish

  # Smithery: the listing points at the remote worker URL (mcp.opengolfapi.org),
  # which redeploys on its own. No publish step needed here. To force a re-publish:
  #   SMITHERY_API_KEY=… npx @smithery/cli mcp publish <url> -n <ns>/opengolfapi
