# Smithery registry config — https://smithery.ai
# Connect the GitHub repo on smithery.ai and it reads this to let users launch the server.
startCommand:
  type: stdio
  configSchema:
    type: object
    properties:
      OPENGOLFAPI_KEY:
        type: string
        title: OpenGolf API Key
        description: Free key (courses.opengolfapi.org/api-keys). Optional — only needed to contribute, sign players in, or run tournaments. All course-read tools work with no key.
    required: []
  commandFunction: |
    (config) => ({
      command: 'npx',
      args: ['-y', '@opengolfapi/mcp-server'],
      env: config.OPENGOLFAPI_KEY ? { OPENGOLFAPI_KEY: config.OPENGOLFAPI_KEY } : {}
    })
  exampleConfig:
    OPENGOLFAPI_KEY: ogapi_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
